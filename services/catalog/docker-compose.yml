services:
  catalog:
    build: .
    container_name: ms-cinema-catalog
    ports:
      - "4001:4001"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: catalog
      DB_USER: catalog
      DB_PASSWORD: catalog
    command: php -S 0.0.0.0:4001 -t public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: ms-cinema-catalog-db
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5433:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  catalog_db_data:
