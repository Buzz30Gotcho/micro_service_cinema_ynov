version: "3.8"
name: ms-cinema

services:
  auth_api:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_api
    env_file:
      - ./services/auth/.env
    environment:
      - MONGO_HOST=auth_bdd
    ports:
      - "4002:4002"
    volumes:
      - ./services/auth:/app
    depends_on:
      - auth_bdd

  auth_bdd:
    image: mongo:6.0
    container_name: auth_bdd
    restart: always
    env_file:
      - ./services/auth/.env
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.0
    container_name: mongo-express
    restart: always
    env_file:
      - ./services/auth/.env
    ports:
      - "8082:8081"
    depends_on:
      - auth_bdd

  postgres:
    image: postgres:16-alpine
    container_name: ms-cinema-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"

  catalog:
    build: ./services/catalog
    container_name: ms-cinema-catalog
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: catalog_db
      DB_USER: catalog_user
      DB_PASSWORD: catalog_pass
    ports:
      - "4001:4001"

  booking:
    build: ./services/booking
    container_name: ms-cinema-booking
    depends_on:
      - postgres
    environment:
      APP_PORT: "4003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
      SECRET_KEY: "A2g1MepEXXRV7ffoAdfnw3a_pvSTxclfx65UVoNuxlcMw-9UGoo3PZYb4E4V0CWR51U_2B65-ocIHMnBsDNnKQ"
    ports:
      - "4003:4003"

  payment:
    build: ./services/payment
    container_name: ms-cinema-payment
    depends_on:
      - postgres
    environment:
      APP_PORT: "4004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: payment_db
      DB_USER: payment_user
      DB_PASSWORD: payment_pass
    ports:
      - "4004:4004"

  front:
    build: ./front
    container_name: ms-cinema-front
    environment:
      VITE_API_BASE: ""
    ports:
      - "5173:5173"
    volumes:
      - ./front/src:/app/src
      - ./front/index.html:/app/index.html

  api-gateway:
    build: ./api-gateway
    container_name: ms-cinema-gateway
    ports:
      - "3030:3030"
    environment:
      - AUTH_URL=http://auth_api:4002
      - CATALOG_URL=http://catalog:4001
      - BOOKING_URL=http://booking:4003
      - PAYMENT_URL=http://payment:4004
    depends_on:
      - auth_api
      - catalog
      - booking
      - payment

volumes:
  pg_data:
  mongo_data:
