version: "3.8"
name: ms-cinema

services:
  auth_api:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_api
    env_file:
      - ./services/auth/.env
    environment:
      - MONGO_HOST=auth_bdd
    ports:
      - "4002:4002"
    volumes:
      - ./services/auth:/app
    depends_on:
      - auth_bdd

  auth_bdd:
    image: mongo:6.0
    container_name: auth_bdd
    restart: always
    env_file:
      - ./services/auth/.env
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.0
    container_name: mongo-express
    restart: always
    env_file:
      - ./services/auth/.env
    ports:
      - "8082:8081"
    depends_on:
      - auth_bdd

  postgres:
    image: postgres:16-alpine
    container_name: ms-cinema-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  catalog:
    build: ./services/catalog
    container_name: ms-cinema-catalog
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: catalog_db
      DB_USER: catalog_user
      DB_PASSWORD: catalog_pass
    ports:
      - "4001:4001"

  booking:
    build: ./services/booking
    container_name: ms-cinema-booking
    depends_on:
      - postgres
    env_file:
      - ./services/auth/.env
    environment:
      APP_PORT: "4003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
    volumes:
      - ./services/booking:/usr/src/app
      - booking_node_modules:/usr/src/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run start:dev"
    ports:
      - "4003:4003"

  admin:
    build: ./services/admin
    container_name: ms-cinema-admin
    environment:
      APP_PORT: "4010"
      ALLOWED_SERVICES: "catalog:ms-cinema-catalog,auth:auth_api,booking:ms-cinema-booking,postgres:ms-cinema-postgres"
    volumes:
      - ./services/admin:/usr/src/app
      - admin_node_modules:/usr/src/app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: sh -c "npm install --production && node src/index.js"
    ports:
      - "4010:4010"

  front:
    build: ./front
    container_name: ms-cinema-front
    environment:
      VITE_API_BASE: ""
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  api-gateway:
    build: ./api-gateway
    container_name: ms-cinema-gateway
    ports:
      - "3030:3030"
    environment:
      - AUTH_URL=http://auth_api:4002
      - CATALOG_URL=http://ms-cinema-catalog:4001
      - BOOKING_URL=http://ms-cinema-booking:4003
      - ADMIN_URL=http://ms-cinema-admin:4010
    volumes:
      - ./api-gateway:/app
      - gateway_node_modules:/app/node_modules
    command: sh -c "npm install && node index.js"
    depends_on:
      - auth_api
      - catalog
      - booking
      - admin

volumes:
  pg_data:
  mongo_data:
  booking_node_modules:
  admin_node_modules:
  front_node_modules:
  gateway_node_modules:
